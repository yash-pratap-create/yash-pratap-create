name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00e676&color_dots[0]=1a1a2e&color_dots[1]=1de954&color_dots[2]=00c853&color_dots[3]=00e676&color_dots[4]=69ff47
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00e676&color_dots[0]=0d1117&color_dots[1]=1de954&color_dots[2]=00c853&color_dots[3]=00e676&color_dots[4]=69ff47

      - name: Push snake animation to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
